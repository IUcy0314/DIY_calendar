<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>

    <radialGradient id="silverGlow" cx="50%" cy="33%" r="64%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".42" stop-color="#f3f4f4"/>
      <stop offset=".75" stop-color="#d6d8d8"/>
      <stop offset="1" stop-color="#aeb2b2"/>
    </radialGradient>
    <linearGradient id="softPaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8f8"/>
      <stop offset=".48" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d9dcdc"/>
    </linearGradient>
    <linearGradient id="edgeShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9da1a1" stop-opacity=".34"/>
      <stop offset=".18" stop-color="#ffffff" stop-opacity=".26"/>
      <stop offset=".82" stop-color="#ffffff" stop-opacity=".2"/>
      <stop offset="1" stop-color="#8f9494" stop-opacity=".36"/>
    </linearGradient>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency=".95" numOctaves="2" seed="27" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .07"/>
      </feComponentTransfer>
    </filter>
    <filter id="softShadow" x="-12%" y="-16%" width="124%" height="132%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#707575" flood-opacity=".2"/>
    </filter>
    <filter id="fineGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="btnGrad" cx="42%" cy="32%" r="72%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".62" stop-color="#e9ecec"/>
      <stop offset="1" stop-color="#b9c0c0"/>
    </radialGradient>
  </defs>
<circle cx="32" cy="32" r="30" fill="url(#btnGrad)" stroke="#ffffff" stroke-width="3"/>
  <circle cx="32" cy="32" r="22" stroke="#9ba2a2" stroke-opacity=".18"/>
  <path d="M21 33.6L32 24L43 33.6V44H36.5V36.8H27.5V44H21V33.6Z" fill="#ffffff" fill-opacity=".9"/>
  <path d="M21 33.6L32 24L43 33.6" stroke="#899191" stroke-opacity=".34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
